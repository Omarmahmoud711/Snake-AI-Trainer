<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake-RL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/img/bondo2.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <a class="brand" href="#/">
            <img class="brand-logo-img" src="/static/img/bondo2.png" alt="Bondo2" width="34" height="34">
            <h1>Snake-RL · <span class="brand-sub">Bondo2</span></h1>
        </a>
        <nav>
            <a href="#/" class="navlink">Menu</a>
        </nav>
    </header>

    <main id="app">
        <!-- ============ MENU ============ -->
        <section data-view="menu" class="view view-centered">
            <div class="hero">
                <h2 class="hero-title">Neural Serpent</h2>
                <p class="hero-sub">A Dueling Double-DQN agent playing Snake in four modes. Watch it learn, watch a trained agent play, or take it on yourself.</p>
            </div>
            <div class="menu-grid">
                <button class="card" data-go="#/learn">
                    <span class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 10 12 5 2 10l10 5 10-5Z"/>
                            <path d="M6 12.5V17c0 1.7 2.7 3 6 3s6-1.3 6-3v-4.5"/>
                            <path d="M22 10v6"/>
                        </svg>
                    </span>
                    <span class="card-title">Watch it learn</span>
                    <span class="card-desc">Train a fresh agent live. Speed slider, pause, reset.</span>
                </button>
                <button class="card" data-go="#/play">
                    <span class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="9"/>
                            <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
                        </svg>
                    </span>
                    <span class="card-title">Watch it play</span>
                    <span class="card-desc">A pre-trained agent playing greedily.</span>
                </button>
                <button class="card" data-go="#/compete">
                    <span class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.5 17.5 3 6V3h3l11.5 11.5"/>
                            <path d="m13 19 6-6"/>
                            <path d="m16 16 4 4"/>
                            <path d="m19 21 2-2"/>
                            <path d="M14.5 6.5 19 2l3 0-0 3-4.5 4.5"/>
                            <path d="m5 14 5 5"/>
                            <path d="m7 17-1.5 1.5"/>
                        </svg>
                    </span>
                    <span class="card-title">Compete</span>
                    <span class="card-desc">You vs the AI in the duel arena.</span>
                </button>
            </div>
        </section>

        <!-- ============ MODE PICKER ============ -->
        <section data-view="modes" class="view view-centered">
            <h2 id="modes-title" class="panel-title">Pick a mode</h2>
            <div class="mode-grid">
                <button class="mode" data-mode="walls">
                    <span class="mode-name">Walls</span>
                    <small>Classic — the boundary kills you.</small>
                </button>
                <button class="mode" data-mode="no_walls">
                    <span class="mode-name">No Walls</span>
                    <small>The board wraps around at the edges.</small>
                </button>
                <button class="mode" data-mode="rocks">
                    <span class="mode-name">Rocks</span>
                    <small>No walls. Rocks spawn. Touching one kills you.</small>
                </button>
                <button class="mode" data-mode="duel">
                    <span class="mode-name">Duel</span>
                    <small>Two agents sharing a wrapping board.</small>
                </button>
            </div>
            <div id="mode-availability" class="hint"></div>
        </section>

        <!-- ============ GAME ============ -->
        <section data-view="game" class="view">
            <div class="game-shell">
                <div class="canvas-wrap">
                    <canvas id="board" width="640" height="480"></canvas>
                    <div id="overlay" class="overlay"></div>
                </div>
                <aside class="hud">
                    <div class="hud-head">
                        <span class="mode-chip" id="mode-chip">—</span>
                        <span class="phase-chip" id="phase-chip">—</span>
                    </div>
                    <div id="hud-stats" class="hud-stats"></div>
                    <div class="controls">
                        <label>Speed
                            <input id="speed" type="range" min="1" max="120" value="10">
                            <output id="speed-out">10</output><span class="u">fps</span>
                        </label>
                        <div class="btn-row">
                            <button id="pause" class="btn">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
                                Pause
                            </button>
                            <button id="reset" class="btn">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
                                Reset
                            </button>
                        </div>
                        <button id="back" class="btn btn-ghost">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
                            Back to menu
                        </button>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
